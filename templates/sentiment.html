<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentiment Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 { font-size: 2rem; margin-bottom: 0.25rem; color: #2d3748; }
    p.subtitle { color: #718096; margin-bottom: 2rem; }

    nav { margin-bottom: 1.5rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    nav a { color: #3182ce; text-decoration: none; font-weight: 600; }
    nav a:hover { text-decoration: underline; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: .5rem;
      color: #2d3748;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: .75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      transition: border-color .2s;
    }
    textarea:focus { outline: none; border-color: #3182ce; }

    button {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; }

    #btnAnalyze {
      background: #805ad5;
      color: #fff;
      margin-top: 1rem;
      width: 100%;
      justify-content: center;
    }

    #status {
      text-align: center;
      font-size: .9rem;
      color: #718096;
      margin-top: 1rem;
      min-height: 1.2em;
    }

    /* ── Result card ── */
    .result {
      display: none;
      margin-top: 1.5rem;
      padding: 1.25rem;
      border-radius: 10px;
      text-align: center;
      border: 2px solid #e2e8f0;
    }
    .result.good    { background: #f0fff4; border-color: #38a169; }
    .result.neutral { background: #fffff0; border-color: #d69e2e; }
    .result.bad     { background: #fff5f5; border-color: #e53e3e; }

    .result-label {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: .25rem;
    }
    .result.good    .result-label { color: #38a169; }
    .result.neutral .result-label { color: #d69e2e; }
    .result.bad     .result-label { color: #e53e3e; }

    .result-score {
      font-size: 1.1rem;
      color: #4a5568;
    }

    /* ── Score bar ── */
    .score-bar-container {
      margin-top: .75rem;
      position: relative;
      height: 12px;
      background: linear-gradient(to right, #e53e3e, #d69e2e 50%, #38a169);
      border-radius: 6px;
      overflow: visible;
    }
    .score-marker {
      position: absolute;
      top: -4px;
      width: 20px; height: 20px;
      background: #2d3748;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
      transform: translateX(-50%);
      transition: left .4s ease;
    }
    .score-labels {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
      color: #718096;
      margin-top: .35rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
  </style>
</head>
<body>
  <h1>📊 Sentiment Analysis</h1>
  <p class="subtitle">Enter text and get a sentiment score powered by OpenAI</p>
  <nav>
    <a href="/">🎙 Recorder</a>
    <a href="/tts">🔊 TTS</a>
    <a href="/stt">🎤 STT</a>
    <a href="/chat">🧠 Chat</a>
  </nav>

  <div class="card">
    <label for="textInput">Enter text to analyze:</label>
    <textarea id="textInput" placeholder="Type or paste text here…"></textarea>

    <button id="btnAnalyze">📊 Analyze Sentiment</button>

    <div id="status"></div>

    <div id="result" class="result">
      <div class="result-label" id="resultLabel"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="score-bar-container">
        <div class="score-marker" id="scoreMarker"></div>
      </div>
      <div class="score-labels">
        <span>-1 Bad</span>
        <span>0 Neutral</span>
        <span>+1 Good</span>
      </div>
    </div>
  </div>

  <script>
    const btnAnalyze  = document.getElementById('btnAnalyze');
    const textInput   = document.getElementById('textInput');
    const statusEl    = document.getElementById('status');
    const resultDiv   = document.getElementById('result');
    const resultLabel = document.getElementById('resultLabel');
    const resultScore = document.getElementById('resultScore');
    const scoreMarker = document.getElementById('scoreMarker');

    function setStatus(msg, type) {
      statusEl.innerHTML = msg;
      statusEl.style.color = type === 'error' ? '#e53e3e' : '#718096';
    }

    const EMOJI = { Good: '😊', Neutral: '😐', Bad: '😞' };

    btnAnalyze.addEventListener('click', async () => {
      const text = textInput.value.trim();
      if (!text) {
        setStatus('⚠️ Please enter some text first.', 'error');
        return;
      }

      btnAnalyze.disabled = true;
      btnAnalyze.innerHTML = '<span class="spinner"></span> Analyzing…';
      resultDiv.style.display = 'none';
      setStatus('Sending to OpenAI…');

      try {
        const res = await fetch('/sentiment/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus('⚠️ ' + (data.error || 'Something went wrong.'), 'error');
          return;
        }

        const { score, label } = data;
        const emoji = EMOJI[label] || '';

        resultLabel.textContent = `${emoji} ${label}`;
        resultScore.textContent = `Score: ${score.toFixed(2)}`;

        // Position marker: score -1..+1 → 0%..100%
        const pct = ((score + 1) / 2) * 100;
        scoreMarker.style.left = pct + '%';

        resultDiv.className = 'result ' + label.toLowerCase();
        resultDiv.style.display = 'block';
        setStatus('');
      } catch (err) {
        setStatus('⚠️ Network error: ' + err.message, 'error');
      } finally {
        btnAnalyze.disabled = false;
        btnAnalyze.innerHTML = '📊 Analyze Sentiment';
      }
    });
  </script>
</body>
</html>
