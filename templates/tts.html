<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text to Speech</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tts.css') }}" />
</head>
<body>
  <h1>🔊 Text to Speech</h1>
  <p class="subtitle">Type text and hear it read aloud in your cloned voice</p>
  <nav>
    <a href="/">← Recorder</a> &nbsp;|&nbsp;
    <a href="/stt">🎤 STT</a> &nbsp;|&nbsp;
    <a href="/sentiment">📊 Sentiment</a> &nbsp;|&nbsp;
    <a href="/chat">🧠 Chat</a> &nbsp;|&nbsp;
    <a href="/voice-chat">🎙🧠 Voice Chat</a> &nbsp;|&nbsp;
    <a href="/about">ℹ️ About</a>
    {% if current_user %}&nbsp;|&nbsp; <a href="/auth/logout">🚪 Logout ({{ current_user }})</a>{% endif %}
  </nav>

  <div class="card">
    <label for="langSelect">Language:</label>
    <select id="langSelect">
      <option value="en">🇬🇧 English</option>
      <option value="es">🇪🇸 Spanish</option>
      <option value="de">🇩🇪 German</option>
      <option value="fr">🇫🇷 French</option>
      <option value="it">🇮🇹 Italian</option>
      <option value="pt">🇵🇹 Portuguese</option>
      <option value="ja">🇯🇵 Japanese</option>
      <option value="zh">🇨🇳 Chinese</option>
      <option value="ko">🇰🇷 Korean</option>
    </select>

    <label for="textInput" style="margin-top:1rem">Enter text to read:</label>
    <textarea id="textInput" placeholder="Type something here…"></textarea>

    <button id="btnSpeak">&#9654; Read Aloud</button>

    <div id="status"></div>
    <audio id="audioPlayer" controls></audio>
  </div>

  <script>
    const btnSpeak    = document.getElementById('btnSpeak');
    const textInput   = document.getElementById('textInput');
    const langSelect  = document.getElementById('langSelect');
    const statusEl    = document.getElementById('status');
    const audioPlayer = document.getElementById('audioPlayer');

    function setStatus(msg, type) {
      statusEl.innerHTML = msg;
      statusEl.style.color = type === 'error' ? '#e53e3e' : '#718096';
    }

    btnSpeak.addEventListener('click', async () => {
      const text = textInput.value.trim();
      if (!text) {
        setStatus('⚠️ Please enter some text first.', 'error');
        return;
      }

      btnSpeak.disabled = true;
      btnSpeak.innerHTML = '<span class="spinner"></span> Generating…';
      audioPlayer.style.display = 'none';
      setStatus('Sending text to ElevenLabs…');

      try {
        const res = await fetch('/tts/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, language: langSelect.value }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          setStatus('⚠️ ' + (err.error || 'Something went wrong.'), 'error');
          return;
        }

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);

        audioPlayer.src = url;
        audioPlayer.style.display = 'block';
        audioPlayer.play();
        setStatus('✅ Playing audio');
      } catch (err) {
        setStatus('⚠️ Network error: ' + err.message, 'error');
      } finally {
        btnSpeak.disabled = false;
        btnSpeak.innerHTML = '&#9654; Read Aloud';
      }
    });
  </script>
</body>
</html>
