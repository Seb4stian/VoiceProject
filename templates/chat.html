<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psychology Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}" />
</head>
<body>
  <h1>🧠 Psychology Chat</h1>
  <p class="subtitle">A compassionate AI psychologist. Speak in any language — it will respond in yours.</p>
  <nav>
    <a href="/">🎙 Recorder</a>
    <a href="/tts">🔊 TTS</a>
    <a href="/stt">🎤 STT</a>
    <a href="/sentiment">📊 Sentiment</a>
    <a href="/about">ℹ️ About</a>
  </nav>

  <div class="card">
    <div id="chatBox"></div>

    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Type your message…" autocomplete="off" />
      <button id="btnSend">Send</button>
    </div>

    <button id="btnEnd">End Chat &amp; Get Summary</button>
    <div id="status"></div>
  </div>

  <div class="card" id="summarySection">
    <h3>📋 Psychological Assessment</h3>
    <div id="summaryContent"></div>
  </div>

  <script>
    const chatBox   = document.getElementById('chatBox');
    const msgInput  = document.getElementById('msgInput');
    const btnSend   = document.getElementById('btnSend');
    const btnEnd    = document.getElementById('btnEnd');
    const statusEl  = document.getElementById('status');
    const summarySection = document.getElementById('summarySection');
    const summaryContent = document.getElementById('summaryContent');

    // Conversation history: [{role, content}]
    let history = [];
    let chatEnded = false;

    function setStatus(msg, type) {
      statusEl.innerHTML = msg;
      statusEl.style.color = type === 'error' ? '#e53e3e' : '#718096';
    }

    function addMessage(role, text, sentiment) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;

      if (sentiment && role === 'user') {
        const badge = document.createElement('div');
        const lbl = sentiment.label.toLowerCase();
        badge.className = 'sentiment-badge ' + lbl;
        badge.textContent = `${sentiment.label} (${sentiment.score.toFixed(2)})`;
        div.appendChild(badge);
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing-indicator';
      el.id = 'typing';
      el.textContent = 'Psychologist is typing…';
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    // ── Start the conversation ──
    async function startChat() {
      btnSend.disabled = true;
      showTyping();
      try {
        const res = await fetch('/chat/start', { method: 'POST' });
        const data = await res.json();
        hideTyping();
        if (res.ok) {
          history.push({ role: 'assistant', content: data.reply });
          addMessage('assistant', data.reply);
        } else {
          setStatus('⚠️ ' + (data.error || 'Failed to start'), 'error');
        }
      } catch (err) {
        hideTyping();
        setStatus('⚠️ Network error: ' + err.message, 'error');
      }
      btnSend.disabled = false;
      msgInput.focus();
    }

    // ── Send message ──
    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || chatEnded) return;

      addMessage('user', text);
      msgInput.value = '';
      btnSend.disabled = true;
      showTyping();

      try {
        const res = await fetch('/chat/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });
        const data = await res.json();
        hideTyping();

        if (res.ok) {
          // Update the user message bubble with sentiment
          const userBubbles = chatBox.querySelectorAll('.msg.user');
          const lastUser = userBubbles[userBubbles.length - 1];
          if (lastUser && data.sentiment) {
            const badge = document.createElement('div');
            const lbl = data.sentiment.label.toLowerCase();
            badge.className = 'sentiment-badge ' + lbl;
            badge.textContent = `${data.sentiment.label} (${data.sentiment.score.toFixed(2)})`;
            lastUser.appendChild(badge);
          }

          history.push({ role: 'user', content: text });
          history.push({ role: 'assistant', content: data.reply });
          addMessage('assistant', data.reply);
        } else {
          setStatus('⚠️ ' + (data.error || 'Send failed'), 'error');
        }
      } catch (err) {
        hideTyping();
        setStatus('⚠️ Network error: ' + err.message, 'error');
      }
      btnSend.disabled = false;
      msgInput.focus();
    }

    // ── End chat & get summary ──
    async function endChat() {
      if (history.length < 2) {
        setStatus('⚠️ Have a conversation first before requesting a summary.', 'error');
        return;
      }

      chatEnded = true;
      btnSend.disabled = true;
      btnEnd.disabled = true;
      msgInput.disabled = true;
      setStatus('<span class="spinner spinner-dark"></span> Generating psychological assessment…');

      try {
        const res = await fetch('/chat/summary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ history }),
        });
        const data = await res.json();

        if (res.ok) {
          renderSummary(data);
          setStatus('✅ Assessment complete. Chat ended.');
        } else {
          setStatus('⚠️ ' + (data.error || 'Summary failed'), 'error');
          chatEnded = false;
          btnSend.disabled = false;
          btnEnd.disabled = false;
          msgInput.disabled = false;
        }
      } catch (err) {
        setStatus('⚠️ Network error: ' + err.message, 'error');
        chatEnded = false;
        btnSend.disabled = false;
        btnEnd.disabled = false;
        msgInput.disabled = false;
      }
    }

    function renderSummary(s) {
      const overallLabel = s.overall_sentiment > 0.25 ? 'good' : s.overall_sentiment < -0.25 ? 'bad' : 'neutral';
      const overallEmoji = { good: '😊', neutral: '😐', bad: '😞' }[overallLabel];

      let html = `
        <div class="summary-field">
          <strong>Overall Sentiment:</strong>
          <span class="overall-score ${overallLabel}">${overallEmoji} ${s.overall_sentiment.toFixed(2)}</span>
        </div>
        <div class="summary-field">
          <strong>Emotional State:</strong> ${s.emotional_state}
        </div>
        <div class="summary-field">
          <strong>Key Concerns:</strong>
          <ul>${(s.key_concerns || []).map(c => `<li>${c}</li>`).join('')}</ul>
        </div>
        <div class="summary-field">
          <strong>Positive Signs:</strong>
          <ul>${(s.positive_signs || []).map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        <div class="summary-field">
          <strong>Mental State Assessment:</strong><br>${s.mental_state_assessment}
        </div>
        <div class="summary-field">
          <strong>Recommendations:</strong>
          <ul>${(s.recommendations || []).map(r => `<li>${r}</li>`).join('')}</ul>
        </div>
        <div class="summary-field">
          <strong>Summary:</strong><br>${s.summary}
        </div>
      `;
      summaryContent.innerHTML = html;
      summarySection.style.display = 'block';
      summarySection.scrollIntoView({ behavior: 'smooth' });
    }

    // ── Event listeners ──
    btnSend.addEventListener('click', sendMessage);
    btnEnd.addEventListener('click', endChat);
    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Start automatically
    startChat();
  </script>
</body>
</html>
