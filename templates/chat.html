<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psychology Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 { font-size: 2rem; margin-bottom: 0.25rem; color: #2d3748; }
    p.subtitle { color: #718096; margin-bottom: 1.5rem; text-align: center; max-width: 560px; }

    nav { margin-bottom: 1.5rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    nav a { color: #3182ce; text-decoration: none; font-weight: 600; }
    nav a:hover { text-decoration: underline; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      padding: 1.5rem;
      width: 100%;
      max-width: 620px;
    }

    /* ── Chat window ── */
    #chatBox {
      height: 400px;
      overflow-y: auto;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
      background: #fafbfc;
    }

    .msg { max-width: 85%; padding: .6rem .9rem; border-radius: 12px; font-size: .95rem; line-height: 1.45; }
    .msg.assistant { align-self: flex-start; background: #e2e8f0; color: #2d3748; border-bottom-left-radius: 3px; }
    .msg.user      { align-self: flex-end;   background: #3182ce; color: #fff;    border-bottom-right-radius: 3px; }

    .sentiment-badge {
      display: inline-block;
      font-size: .72rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 4px;
    }
    .sentiment-badge.good    { background: #c6f6d5; color: #276749; }
    .sentiment-badge.neutral { background: #fefcbf; color: #975a16; }
    .sentiment-badge.bad     { background: #fed7d7; color: #9b2c2c; }

    /* ── Input area ── */
    .input-row {
      display: flex;
      gap: .5rem;
    }
    #msgInput {
      flex: 1;
      padding: .65rem .75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
    }
    #msgInput:focus { outline: none; border-color: #3182ce; }

    button {
      padding: .65rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; }

    #btnSend { background: #3182ce; color: #fff; }
    #btnEnd  { background: #e53e3e; color: #fff; margin-top: .75rem; width: 100%; }

    #status {
      text-align: center;
      font-size: .85rem;
      color: #718096;
      margin-top: .5rem;
      min-height: 1.1em;
    }

    /* ── Summary section ── */
    #summarySection {
      display: none;
      margin-top: 1.5rem;
      padding: 1.25rem;
      border: 2px solid #805ad5;
      border-radius: 10px;
      background: #faf5ff;
    }
    #summarySection h3 {
      color: #553c9a;
      font-size: 1.15rem;
      margin-bottom: .75rem;
    }
    .summary-field { margin-bottom: .75rem; }
    .summary-field strong { color: #553c9a; }
    .summary-field ul { margin-left: 1.2rem; margin-top: .25rem; }
    .summary-field li { margin-bottom: .2rem; }

    .overall-score {
      display: inline-block;
      font-size: 1.3rem;
      font-weight: 700;
      padding: .3rem .8rem;
      border-radius: 8px;
      margin-bottom: .5rem;
    }
    .overall-score.good    { background: #c6f6d5; color: #276749; }
    .overall-score.neutral { background: #fefcbf; color: #975a16; }
    .overall-score.bad     { background: #fed7d7; color: #9b2c2c; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .spinner-dark {
      border-color: #718096;
      border-top-color: transparent;
    }

    .typing-indicator {
      align-self: flex-start;
      color: #a0aec0;
      font-style: italic;
      font-size: .85rem;
      padding: .4rem .8rem;
    }
  </style>
</head>
<body>
  <h1>🧠 Psychology Chat</h1>
  <p class="subtitle">A compassionate AI psychologist. Speak in any language — it will respond in yours.</p>
  <nav>
    <a href="/">🎙 Recorder</a>
    <a href="/tts">🔊 TTS</a>
    <a href="/stt">🎤 STT</a>
    <a href="/sentiment">📊 Sentiment</a>
  </nav>

  <div class="card">
    <div id="chatBox"></div>

    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Type your message…" autocomplete="off" />
      <button id="btnSend">Send</button>
    </div>

    <button id="btnEnd">End Chat &amp; Get Summary</button>
    <div id="status"></div>
  </div>

  <div class="card" id="summarySection">
    <h3>📋 Psychological Assessment</h3>
    <div id="summaryContent"></div>
  </div>

  <script>
    const chatBox   = document.getElementById('chatBox');
    const msgInput  = document.getElementById('msgInput');
    const btnSend   = document.getElementById('btnSend');
    const btnEnd    = document.getElementById('btnEnd');
    const statusEl  = document.getElementById('status');
    const summarySection = document.getElementById('summarySection');
    const summaryContent = document.getElementById('summaryContent');

    // Conversation history: [{role, content}]
    let history = [];
    let chatEnded = false;

    function setStatus(msg, type) {
      statusEl.innerHTML = msg;
      statusEl.style.color = type === 'error' ? '#e53e3e' : '#718096';
    }

    function addMessage(role, text, sentiment) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;

      if (sentiment && role === 'user') {
        const badge = document.createElement('div');
        const lbl = sentiment.label.toLowerCase();
        badge.className = 'sentiment-badge ' + lbl;
        badge.textContent = `${sentiment.label} (${sentiment.score.toFixed(2)})`;
        div.appendChild(badge);
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing-indicator';
      el.id = 'typing';
      el.textContent = 'Psychologist is typing…';
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    // ── Start the conversation ──
    async function startChat() {
      btnSend.disabled = true;
      showTyping();
      try {
        const res = await fetch('/chat/start', { method: 'POST' });
        const data = await res.json();
        hideTyping();
        if (res.ok) {
          history.push({ role: 'assistant', content: data.reply });
          addMessage('assistant', data.reply);
        } else {
          setStatus('⚠️ ' + (data.error || 'Failed to start'), 'error');
        }
      } catch (err) {
        hideTyping();
        setStatus('⚠️ Network error: ' + err.message, 'error');
      }
      btnSend.disabled = false;
      msgInput.focus();
    }

    // ── Send message ──
    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || chatEnded) return;

      addMessage('user', text);
      msgInput.value = '';
      btnSend.disabled = true;
      showTyping();

      try {
        const res = await fetch('/chat/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });
        const data = await res.json();
        hideTyping();

        if (res.ok) {
          // Update the user message bubble with sentiment
          const userBubbles = chatBox.querySelectorAll('.msg.user');
          const lastUser = userBubbles[userBubbles.length - 1];
          if (lastUser && data.sentiment) {
            const badge = document.createElement('div');
            const lbl = data.sentiment.label.toLowerCase();
            badge.className = 'sentiment-badge ' + lbl;
            badge.textContent = `${data.sentiment.label} (${data.sentiment.score.toFixed(2)})`;
            lastUser.appendChild(badge);
          }

          history.push({ role: 'user', content: text });
          history.push({ role: 'assistant', content: data.reply });
          addMessage('assistant', data.reply);
        } else {
          setStatus('⚠️ ' + (data.error || 'Send failed'), 'error');
        }
      } catch (err) {
        hideTyping();
        setStatus('⚠️ Network error: ' + err.message, 'error');
      }
      btnSend.disabled = false;
      msgInput.focus();
    }

    // ── End chat & get summary ──
    async function endChat() {
      if (history.length < 2) {
        setStatus('⚠️ Have a conversation first before requesting a summary.', 'error');
        return;
      }

      chatEnded = true;
      btnSend.disabled = true;
      btnEnd.disabled = true;
      msgInput.disabled = true;
      setStatus('<span class="spinner spinner-dark"></span> Generating psychological assessment…');

      try {
        const res = await fetch('/chat/summary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ history }),
        });
        const data = await res.json();

        if (res.ok) {
          renderSummary(data);
          setStatus('✅ Assessment complete. Chat ended.');
        } else {
          setStatus('⚠️ ' + (data.error || 'Summary failed'), 'error');
          chatEnded = false;
          btnSend.disabled = false;
          btnEnd.disabled = false;
          msgInput.disabled = false;
        }
      } catch (err) {
        setStatus('⚠️ Network error: ' + err.message, 'error');
        chatEnded = false;
        btnSend.disabled = false;
        btnEnd.disabled = false;
        msgInput.disabled = false;
      }
    }

    function renderSummary(s) {
      const overallLabel = s.overall_sentiment > 0.25 ? 'good' : s.overall_sentiment < -0.25 ? 'bad' : 'neutral';
      const overallEmoji = { good: '😊', neutral: '😐', bad: '😞' }[overallLabel];

      let html = `
        <div class="summary-field">
          <strong>Overall Sentiment:</strong>
          <span class="overall-score ${overallLabel}">${overallEmoji} ${s.overall_sentiment.toFixed(2)}</span>
        </div>
        <div class="summary-field">
          <strong>Emotional State:</strong> ${s.emotional_state}
        </div>
        <div class="summary-field">
          <strong>Key Concerns:</strong>
          <ul>${(s.key_concerns || []).map(c => `<li>${c}</li>`).join('')}</ul>
        </div>
        <div class="summary-field">
          <strong>Positive Signs:</strong>
          <ul>${(s.positive_signs || []).map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        <div class="summary-field">
          <strong>Mental State Assessment:</strong><br>${s.mental_state_assessment}
        </div>
        <div class="summary-field">
          <strong>Recommendations:</strong>
          <ul>${(s.recommendations || []).map(r => `<li>${r}</li>`).join('')}</ul>
        </div>
        <div class="summary-field">
          <strong>Summary:</strong><br>${s.summary}
        </div>
      `;
      summaryContent.innerHTML = html;
      summarySection.style.display = 'block';
      summarySection.scrollIntoView({ behavior: 'smooth' });
    }

    // ── Event listeners ──
    btnSend.addEventListener('click', sendMessage);
    btnEnd.addEventListener('click', endChat);
    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Start automatically
    startChat();
  </script>
</body>
</html>
