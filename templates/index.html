<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Recorder</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/recorder.css') }}" />
</head>
<body>
  <h1>🎙 Voice Recorder</h1>
  <p class="subtitle">Record, save and replay your voice directly in the browser</p>
  <nav>
    <a href="/tts">🔊 TTS</a>
    <a href="/stt">🎤 STT</a>
    <a href="/sentiment">📊 Sentiment</a>
    <a href="/chat">🧠 Chat</a>
    <a href="/voice-chat">🎙🧠 Voice Chat</a>
    <a href="/about">ℹ️ About</a>
    {% if current_user %}<a href="/auth/logout">🚪 Logout ({{ current_user }})</a>{% endif %}
  </nav>

  <div class="card">
    <!-- Controls -->
    <div class="controls">
      <button id="btnRecord">&#9679; Record</button>
      <button id="btnStop"    disabled>&#9632; Stop</button>
    </div>

    <!-- Status -->
    <div id="status">Press <strong>Record</strong> to start.</div>

    <!-- Preview before saving -->
    <audio id="preview" controls></audio>

    <!-- Save / Discard -->
    <div class="controls" id="saveControls" style="display:none;">
      <button id="btnDiscard">&#10005; Discard</button>
      <button id="btnSave">&#10003; Save to server</button>
    </div>

    <!-- Saved recordings -->
    <h2>Saved recordings</h2>
    <ul id="recordings-list">
      <li id="noRecordings">No recordings yet.</li>
    </ul>
  </div>

  <script>
    const btnRecord  = document.getElementById('btnRecord');
    const btnStop    = document.getElementById('btnStop');
    const btnSave    = document.getElementById('btnSave');
    const btnDiscard = document.getElementById('btnDiscard');
    const preview    = document.getElementById('preview');
    const status     = document.getElementById('status');
    const saveControls = document.getElementById('saveControls');
    const list       = document.getElementById('recordings-list');

    let mediaRecorder = null;
    let chunks        = [];
    let blob          = null;

    // ── Load recordings on startup ──────────────────────────────────────────
    async function loadRecordings() {
      const res  = await fetch('/recordings');
      const files = await res.json();
      const noRec = document.getElementById('noRecordings');

      if (files.length === 0) {
        if (!noRec) {
          list.innerHTML = '<li id="noRecordings">No recordings yet.</li>';
        }
        return;
      }

      list.innerHTML = '';
      files.forEach(filename => addRecordingToList(filename));
    }

    function addRecordingToList(filename) {
      const noRec = document.getElementById('noRecordings');
      if (noRec) noRec.remove();

      const li     = document.createElement('li');
      const name   = document.createElement('div');
      const audio  = document.createElement('audio');

      name.className   = 'rec-name';
      name.textContent = filename;

      audio.className  = 'rec-player';
      audio.controls   = true;
      audio.src        = `/recordings/${encodeURIComponent(filename)}`;

      li.prepend(audio);
      li.prepend(name);
      list.prepend(li);   // newest first
    }

    // ── Record ───────────────────────────────────────────────────────────────
    btnRecord.addEventListener('click', async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('⚠️ Your browser does not support audio recording.', 'error');
        return;
      }

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        setStatus('⚠️ Microphone access denied: ' + err.message, 'error');
        return;
      }

      chunks = [];
      blob   = null;
      preview.style.display = 'none';
      saveControls.style.display = 'none';

      // Pick the best supported MIME type
      const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'].find(
        m => MediaRecorder.isTypeSupported(m)
      ) || '';

      if (!mimeType) {
        console.warn('No preferred MIME type supported; falling back to browser default. Recording may vary.');
      }

      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        const url = URL.createObjectURL(blob);
        preview.src = url;
        preview.style.display = 'block';
        saveControls.style.display = 'flex';
        setStatus('Recording complete. Preview below, then save or discard.');
      };

      mediaRecorder.start();
      btnRecord.classList.add('recording');
      btnRecord.disabled = true;
      btnStop.disabled   = false;
      setStatus('🔴 Recording…');
    });

    // ── Stop ─────────────────────────────────────────────────────────────────
    btnStop.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      btnRecord.classList.remove('recording');
      btnRecord.disabled = false;
      btnStop.disabled   = true;
    });

    // ── Discard ───────────────────────────────────────────────────────────────
    btnDiscard.addEventListener('click', () => {
      blob = null;
      preview.src          = '';
      preview.style.display = 'none';
      saveControls.style.display = 'none';
      setStatus('Recording discarded. Press <strong>Record</strong> to start again.');
    });

    // ── Save ──────────────────────────────────────────────────────────────────
    btnSave.addEventListener('click', async () => {
      if (!blob) return;

      btnSave.disabled    = true;
      btnDiscard.disabled = true;
      setStatus('Uploading…');

      const mimeUsed = mediaRecorder.mimeType || 'audio/webm';
      let ext = 'webm';
      try {
        ext = mimeUsed.split('/')[1].split(';')[0] || 'webm';
      } catch (_) {
        ext = 'webm';
      }
      const form = new FormData();
      form.append('audio', blob, `recording.${ext}`);

      try {
        const res  = await fetch('/upload', { method: 'POST', body: form });
        const data = await res.json();

        if (res.ok) {
          setStatus('✅ Saved as <strong>' + data.filename + '</strong>');
          addRecordingToList(data.filename);
        } else {
          setStatus('⚠️ Upload failed: ' + (data.error || res.statusText), 'error');
        }
      } catch (err) {
        setStatus('⚠️ Network error: ' + err.message, 'error');
      }

      blob = null;
      preview.src          = '';
      preview.style.display = 'none';
      saveControls.style.display = 'none';
      btnSave.disabled    = false;
      btnDiscard.disabled = false;
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setStatus(msg, type) {
      status.innerHTML = msg;
      status.style.color = type === 'error' ? '#e53e3e' : '#718096';
    }

    // Initial load
    loadRecordings();
  </script>
</body>
</html>
